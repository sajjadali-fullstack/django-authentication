<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %}
    <title>Base | Page</title>
    {% endblock title %}

    {% block styleBlock %}
    <style>
        .navbar-nav .nav-link {
    position: relative;
    color: #9ca3af !important; /* Non-active links ka color thoda light */
    transition: color 0.3s ease;
}

/* Active link color */
.navbar-nav .nav-item.active .nav-link {
    color: white !important;
}


.navbar-nav .nav-item.active .nav-link::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: 0px;
    width: 100%;
    height: 2px;
    background-color: white; 
    border-radius: 2px;
}
    </style>
    {% endblock styleBlock %}

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a href="{% url 'sajjad' %}" class="navbar-brand fw-bold fst-italic">SajjadExams</a>

            <ul class="navbar-nav mr-auto">
                <!-- Home -->
                <li class="nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                </li>

                <!-- Java Exam -->
                <li class="nav-item {% if request.resolver_match.url_name == 'java' %}active{% endif %}">
                    <a href="{% url 'java' %}" class="nav-link">Java Exam</a>
                </li>

                <!-- Python Exam -->
                <li class="nav-item  {% if request.resolver_match.url_name == 'python' %}active{% endif %}">
                    <a href="{% url 'python' %}" class="nav-link">Python Exam</a>
                </li>


                <!-- Aptitude Exam -->
                <li class="nav-item  {% if request.resolver_match.url_name == 'aptitude' %}active{% endif %}">
                    <a href="{% url 'aptitude'%}" class="nav-link">Aptitude Exam</a>
                </li>

            </ul>

            <!-- Login / Signup -->
            <ul class="navbar-nav ml-auto">

                <!-- Sign Up -->
                <li class="nav-item">
                    <a href="#" class="nav-link">Signup</a>
                </li>
                <!-- Login -->
                <li class="nav-item">
                    <a href="#" class="nav-link">Login</a>
                </li>

                <!-- Logout -->
                <li class="nav-item">
                    <a href="#" class="nav-link">Logout</a>
                </li>

            </ul>

        </div>
    </nav>
    {% block bodyBlock %}
    {% endblock bodyBlock%}
</body>

</html>
